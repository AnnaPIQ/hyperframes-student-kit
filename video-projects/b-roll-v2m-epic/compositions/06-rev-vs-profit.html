        tl.to(q('#rp-bot'), { opacity: 1, y: 0, duration: 0.6, ease: 'expo.out' }, 7.16);
        tl.to({}, { duration: SLOT }, 0);
        window.__timelines['rev-vs-profit'] = tl;
