<template id="hook-template">
  <div data-composition-id="hook" data-start="0" data-duration="7.05" data-width="1080" data-height="1920">
    <style>
      [data-composition-id="hook"] { position: absolute; inset: 0; overflow: hidden; }
      [data-composition-id="hook"] .bw-wrap { position: absolute; inset: 0; }
      [data-composition-id="hook"] .bw-wrap video { width: 100%; height: 100%; object-fit: cover;
        filter: grayscale(.35) saturate(.5) contrast(1.05) brightness(.62); }
      [data-composition-id="hook"] .bw-grade { position: absolute; inset: 0;
        background: linear-gradient(180deg, rgba(2,16,31,.55) 0%, rgba(6,40,76,.45) 45%, rgba(2,16,31,.82) 100%);
        mix-blend-mode: multiply; }
      [data-composition-id="hook"] .bw-tint { position: absolute; inset: 0;
        background: radial-gradient(80% 60% at 50% 38%, rgba(156,212,255,.18), rgba(156,212,255,0) 70%);
        mix-blend-mode: screen; }
      [data-composition-id="hook"] .stack { position: absolute; inset: 0; display: flex;
        flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
      [data-composition-id="hook"] .line { font-weight: 800; letter-spacing: -.03em; line-height: .94; text-align: center; }
      [data-composition-id="hook"] .up { font-size: 104px;
        background: linear-gradient(180deg, #ffffff 0%, #9CD4FF 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        filter: drop-shadow(0 0 26px rgba(156,212,255,.45)); }
      [data-composition-id="hook"] .down { font-size: 152px; color: #fff;
        text-shadow: 0 0 40px rgba(156,212,255,.4), 0 6px 30px rgba(2,16,31,.9); }
      [data-composition-id="hook"] .down em { font-family: 'Hedvig Letters Serif', serif; font-style: italic;
        font-weight: 400; color: var(--brand-blue-tint); }
      [data-composition-id="hook"] .sub { font-weight: 600; font-size: 30px; letter-spacing: .02em; color: var(--brand-text-dim); }
    </style>

    <div class="bw-wrap">
      <video id="hook-vid" src="assets/bw-car.mp4" data-start="0" data-duration="7.05" data-track-index="0" muted></video>
    </div>
    <div class="bw-grade"></div>
    <div class="bw-tint"></div>

    <div class="stack">
      <div class="line up"   id="h-up">MORE REVENUE.</div>
      <div class="line down" id="h-down">LESS <em>money.</em></div>
      <div class="sub"       id="h-sub">This is probably why.</div>
    </div>

    <script>
      (function(){
        window.__timelines = window.__timelines || {};
        const SLOT = 7.05;
        const q = (s) => '[data-composition-id="hook"] ' + s;
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(q('.bw-wrap'), { scale: 1.04 }, { scale: 1.14, duration: SLOT, ease: 'none' }, 0);
        gsap.set([q('#h-up'), q('#h-down'), q('#h-sub')], { opacity: 0 });
        tl.fromTo(q('#h-up'), { y: 46, opacity: 0, filter: 'blur(14px)' },
                              { y: 0, opacity: 1, filter: 'blur(0px)', duration: 0.6, ease: 'expo.out' }, 1.7);
        tl.fromTo(q('#h-down'), { y: 70, opacity: 0, scale: 1.12, filter: 'blur(20px)' },
                                { y: 0, opacity: 1, scale: 1, filter: 'blur(0px)', duration: 0.55, ease: 'power3.out' }, 3.5);
        tl.fromTo(q('#h-sub'), { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 5.2);
        tl.to(q('.stack'), { y: -150, filter: 'blur(30px)', opacity: 0, duration: 0.33, ease: 'power2.in' }, 6.6);
        tl.to({}, { duration: SLOT }, 0);
        window.__timelines['hook'] = tl;
      })();
    </script>
  </div>
</template>
