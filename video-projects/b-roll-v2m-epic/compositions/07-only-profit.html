<template id="only-profit-template">

      (function(){
        window.__timelines = window.__timelines || {};
        const SLOT = 3.05;
        const q = (s) => '[data-composition-id="only-profit"] ' + s;
        const tl = gsap.timeline({ paused: true });
        gsap.set(q('#o-halo'), { opacity: 0, scale: 0.85 });

        tl.fromTo(q('#o-word'), { opacity: 0, scale: 0.86, filter: 'blur(18px)' },

        tl.fromTo(q('#o-sub'), { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 1.7);
        tl.to({}, { duration: SLOT }, 0);
        window.__timelines['only-profit'] = tl;
