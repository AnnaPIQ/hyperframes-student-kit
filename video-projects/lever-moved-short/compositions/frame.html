<template id="frame-template">
  <div data-composition-id="frame" data-start="0" data-width="1080" data-height="1920" data-duration="24.0">
    <div class="fr-vignette"></div>
    <div class="fr-grain"></div>
    <img class="fr-logo" id="fr-logo" src="../assets/ecomiq-logo-white.svg" alt="EcomIQ" />
    <style>
      [data-composition-id="frame"] { position: absolute; inset: 0; }
      [data-composition-id="frame"] .fr-vignette { position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse 86% 76% at 50% 40%, transparent 56%, rgba(0,0,0,.5) 100%); }
      [data-composition-id="frame"] .fr-grain { position: absolute; inset: 0; pointer-events: none; opacity: .55;
        mix-blend-mode: overlay;
        background-image:
          radial-gradient(rgba(255,255,255,.045) 1px, transparent 1.6px),
          radial-gradient(rgba(255,255,255,.03) 1px, transparent 1.6px),
          radial-gradient(rgba(0,0,0,.05) 1px, transparent 1.6px);
        background-size: 3px 3px, 5px 5px, 7px 7px;
        background-position: 0 0, 1px 2px, 2px 1px; }
      [data-composition-id="frame"] .fr-logo { position: absolute; top: 50px; left: 56px; width: 232px; height: auto;
        opacity: 0; filter: drop-shadow(0 2px 10px rgba(0,0,0,.45)); }
    </style>
    <link rel="stylesheet" href="../assets/fonts.css" />
    <link rel="stylesheet" href="../assets/brand-tokens.css" />
    <script src="../assets/gsap.min.js"></script>
    <script>
      (function () {
        const s = '[data-composition-id="frame"] ';
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(s + "#fr-logo", { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.5);
        tl.to(s + "#fr-logo", { opacity: 0, duration: 0.4, ease: "power2.in" }, 20.0);
        tl.set({}, {}, 24.0);
        window.__timelines = window.__timelines || {};
        window.__timelines["frame"] = tl;
      })();
    </script>
  </div>
</template>
