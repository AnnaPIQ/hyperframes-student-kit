<template id="diverge-template">
  <div data-composition-id="diverge" data-start="0" data-width="1080" data-height="1920" data-duration="5.0">
    <div class="dv-root">
      <div class="dv-tex"></div>
      <div class="dv-streak"></div>
      <div class="dv-head">
        <div class="dv-chip up" id="dv-chip-up">SPEND <i>▲</i></div>
        <div class="dv-title">EVERY MONTH</div>
        <div class="dv-chip down" id="dv-chip-down">ROAS <i>▼</i></div>
      </div>
      <div class="dv-plot">
        <div class="dv-bars">
          <div class="dv-bar" style="height:96px"></div>
          <div class="dv-bar" style="height:140px"></div>
          <div class="dv-bar" style="height:190px"></div>
          <div class="dv-bar" style="height:242px"></div>
          <div class="dv-bar" style="height:292px"></div>
          <div class="dv-bar" style="height:340px"></div>
        </div>
        <svg class="dv-roas-svg" viewBox="0 0 780 420" preserveAspectRatio="none">
          <path class="dv-roas" pathLength="1" d="M48,96 C230,150 410,210 590,268 C660,290 720,308 740,316" />

      </div>
      <div class="dv-axis"><span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span></div>
    </div>
    <style>
      [data-composition-id="diverge"] { position: absolute; inset: 0; }
      [data-composition-id="diverge"] .dv-root {
        position: absolute; inset: 0; overflow: hidden;
        background: radial-gradient(120% 90% at 50% 30%, rgba(156,212,255,.07), transparent 60%), var(--brand-navy);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 26px; padding: 80px 56px 200px; font-family: "Rethink Sans", sans-serif;
      }
      [data-composition-id="diverge"] .dv-tex { position: absolute; inset: -2%; pointer-events: none; opacity: .5;
        background: repeating-linear-gradient(0deg, rgba(156,212,255,.05) 0 1.5px, transparent 1.5px 94px),
                    repeating-linear-gradient(90deg, rgba(156,212,255,.045) 0 1.5px, transparent 1.5px 94px);
        -webkit-mask-image: radial-gradient(120% 92% at 50% 40%, #000 32%, transparent 80%);
                mask-image: radial-gradient(120% 92% at 50% 40%, #000 32%, transparent 80%); }
      [data-composition-id="diverge"] .dv-streak { position: absolute; top: 0; bottom: 0; left: 0; width: 46%;
        background: linear-gradient(90deg, transparent, rgba(199,230,255,.5), transparent);
        filter: blur(24px); transform: skewX(-12deg); opacity: 0; pointer-events: none; }
      [data-composition-id="diverge"] .dv-head { display: flex; align-items: center; gap: 22px; }
      [data-composition-id="diverge"] .dv-title { font-weight: 700; font-size: 30px; letter-spacing: .2em; color: var(--brand-text-dim); }
      [data-composition-id="diverge"] .dv-chip { font-weight: 800; font-size: 40px; letter-spacing: .06em; padding: 10px 26px;
        border-radius: 999px; opacity: 0; }
      [data-composition-id="diverge"] .dv-chip i { font-style: normal; }
      [data-composition-id="diverge"] .dv-chip.up { color: var(--brand-blue-tint); border: 2px solid rgba(156,212,255,.5); }
      [data-composition-id="diverge"] .dv-chip.down { color: var(--brand-flame); border: 2px solid rgba(255,76,50,.5); }
      [data-composition-id="diverge"] .dv-plot { position: relative; width: 780px; height: 400px; }
      [data-composition-id="diverge"] .dv-bars { position: absolute; inset: 0; display: flex; align-items: flex-end;
        justify-content: space-between; padding: 0 6px; }
      [data-composition-id="diverge"] .dv-bar { width: 96px; border-radius: 10px 10px 0 0;
        background: linear-gradient(180deg, var(--brand-blue-tint) 0%, rgba(91,160,224,.55) 100%);
        border: 1px solid rgba(156,212,255,.7); box-shadow: 0 0 18px rgba(156,212,255,.25);
        transform-origin: 50% 100%; transform: scaleY(0); }
      [data-composition-id="diverge"] .dv-roas-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
      [data-composition-id="diverge"] .dv-roas { fill: none; stroke: var(--brand-flame); stroke-width: 10; stroke-linecap: round;
        stroke-dasharray: 1; stroke-dashoffset: 1; filter: drop-shadow(0 0 14px rgba(255,76,50,.6)); }
      [data-composition-id="diverge"] .dv-axis { display: flex; justify-content: space-between; width: 760px;
        font-weight: 600; font-size: 25px; color: var(--brand-text-dim); }
    </style>
    <link rel="stylesheet" href="../assets/fonts.css" />
    <link rel="stylesheet" href="../assets/brand-tokens.css" />
    <script src="../assets/gsap.min.js"></script>
    <script>
      (function () {
        const s = '[data-composition-id="diverge"] ';
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(s + ".dv-root", { yPercent: 9, filter: "blur(22px)", opacity: 0 }, { yPercent: 0, filter: "blur(0px)", opacity: 1, duration: 0.45, ease: "power2.out" }, 0);
        tl.fromTo(s + ".dv-streak", { xPercent: -70, opacity: 0 }, { xPercent: 280, opacity: 1, duration: 0.5, ease: "power3.in" }, 0);
        tl.to(s + ".dv-streak", { opacity: 0, duration: 0.2 }, 0.42);
        tl.to(s + ".dv-tex", { opacity: 0.3, duration: 1.2, yoyo: true, repeat: 1, ease: "sine.inOut" }, 0.4);
        tl.to(s + "#dv-chip-up", { opacity: 1, duration: 0.3 }, 0.3);
        // Spend bars climb UP.
        tl.to(s + ".dv-bar", { scaleY: 1, duration: 0.5, ease: "power3.out", stagger: 0.12 }, 0.3);
        // ROAS drifts DOWN.
        tl.to(s + "#dv-chip-down", { opacity: 1, duration: 0.3 }, 1.3);
        tl.to(s + ".dv-roas", { strokeDashoffset: 0, duration: 1.6, ease: "power1.inOut" }, 1.4);
        tl.to(s + ".dv-root", { yPercent: -9, filter: "blur(22px)", opacity: 0, duration: 0.3, ease: "power2.in" }, 4.6);
        tl.set({}, {}, 5.0);
        window.__timelines = window.__timelines || {};
        window.__timelines["diverge"] = tl;
      })();
    </script>
  </div>
</template>
