  <script>
    (function(){
      const SLOT = 3.6, S = '[data-composition-id="s01-hook"] ', R = '[data-composition-id="s01-hook"]';
      const tl = gsap.timeline({ paused: true });
      tl.fromTo(R, { opacity: 0 }, { opacity: 1, duration: 0.3, ease: 'sine.out' }, 0);
      tl.to(R, { opacity: 0, duration: 0.30, ease: 'sine.in' }, 3.10); // dissolve to the founder beneath

      // draw the rising revenue line
      const rl = document.querySelector(S+'#s01revline');
      const len = rl.getTotalLength();
      gsap.set(rl, { strokeDasharray: len, strokeDashoffset: len });
      tl.to(rl, { strokeDashoffset: 0, duration: 1.1, ease: 'power2.out' }, 0.2);
      tl.fromTo(S+'.revarea', { opacity: 0 }, { opacity: 1, duration: 1.0, ease: 'sine.out' }, 0.5);
      tl.fromTo(S+'.bankline', { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'sine.out' }, 0.4);
      tl.fromTo(S+'#s01peak', { scale: 0, transformOrigin: '50% 50%' }, { scale: 1, duration: 0.4, ease: 'back.out(2)' }, 1.2);

      tl.fromTo(S+'#revtag', { opacity: 0, y: -10, scale: .9 }, { opacity: 1, y: 0, scale: 1, duration: .45, ease: 'back.out(1.8)' }, 0.9);
      tl.fromTo(S+'#banktag', { opacity: 0, y: 10, scale: .9 }, { opacity: 1, y: 0, scale: 1, duration: .45, ease: 'back.out(1.8)' }, 1.2);

      tl.fromTo(S+'.head .l1', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: .55, ease: 'power3.out' }, 1.0);
      tl.fromTo(S+'.head .l2', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: .55, ease: 'power3.out' }, 1.35);

      tl.to({}, { duration: SLOT }, 0);
      window.__timelines = window.__timelines || {};
      window.__timelines['s01-hook'] = tl;
    })();
  </script>
