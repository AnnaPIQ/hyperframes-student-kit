<template id="k-bars-template">
  <script src="../assets/vendor/gsap.min.js"></script>
  <div data-composition-id="k-bars" data-start="0" data-duration="5.48" data-width="1080" data-height="1350">
  <style>
    @font-face { font-family: 'Rethink Sans'; font-style: normal; font-weight: 400 800; font-display: block; src: url(../assets/fonts/RethinkSans.woff2) format('woff2'); }
    @font-face { font-family: 'Hedvig Letters Serif'; font-style: normal; font-weight: 400; font-display: block; src: url(../assets/fonts/HedvigLettersSerif.woff2) format('woff2'); }
    [data-composition-id="k-bars"] { position: absolute; inset: 0; overflow: hidden;
      background: radial-gradient(80% 50% at 50% 100%, rgba(255,76,50,.10) 0%, rgba(6,40,76,0) 60%), #06284C;
      font-family: 'Rethink Sans', system-ui, sans-serif; }
    [data-composition-id="k-bars"] .title { position: absolute; top: 250px; left: 64px; right: 64px; text-align: center;
      font-weight: 700; font-size: 50px; letter-spacing: -.01em; color: #FFFFFF; }
    [data-composition-id="k-bars"] .title em { font-family: 'Hedvig Letters Serif', serif; font-style: italic; font-weight: 400; color: #FF4C32; }
    [data-composition-id="k-bars"] .chart { position: absolute; left: 0; right: 0; top: 380px; height: 760px; }
    [data-composition-id="k-bars"] .baseline { position: absolute; left: 150px; right: 150px; bottom: 150px; height: 2px; background: #1d4a7a; }
    [data-composition-id="k-bars"] .bar { position: absolute; bottom: 152px; width: 230px; transform-origin: bottom center; border-radius: 16px 16px 0 0; }
    [data-composition-id="k-bars"] #barRev { left: 270px; height: 540px; background: linear-gradient(180deg, #9CD4FF, #2d7fd6); box-shadow: 0 0 50px rgba(156,212,255,.35); }
    [data-composition-id="k-bars"] #barPro { left: 580px; height: 72px; background: linear-gradient(180deg, rgba(255,76,50,.35), rgba(255,76,50,.15)); border: 2px solid #FF4C32; }
    [data-composition-id="k-bars"] .blab { position: absolute; bottom: 92px; width: 230px; text-align: center; font-weight: 700; font-size: 32px; color: #FFFFFF; }
    [data-composition-id="k-bars"] .blab small { display: block; font-weight: 600; font-size: 22px; color: #9fb6d4; letter-spacing: .04em; margin-top: 6px; }
    [data-composition-id="k-bars"] #labRev { left: 270px; }
    [data-composition-id="k-bars"] #labPro { left: 580px; }
    [data-composition-id="k-bars"] #recTag { position: absolute; left: 258px; top: 4px; background: rgba(6,40,76,.9);
      border: 1px solid rgba(156,212,255,.55); color: #9CD4FF; font-weight: 700; font-size: 26px; padding: 8px 16px; border-radius: 999px; box-shadow: 0 6px 20px rgba(0,0,0,.4); }
    [data-composition-id="k-bars"] #stillTag { position: absolute; left: 560px; bottom: 250px; background: rgba(255,76,50,.16);
      border: 1px solid rgba(255,76,50,.5); color: #FF8A4C; font-weight: 700; font-size: 26px; padding: 8px 16px; border-radius: 999px; }
  </style>

  <div class="title clip" data-start="0.1" data-duration="5.3" data-track-index="1">Revenue sets records &mdash; profit <em>stands still</em>.</div>

  <div class="chart clip" data-start="0.2" data-duration="5.28" data-track-index="2">
    <div class="baseline"></div>
    <div class="bar" id="barRev"></div>
    <div class="bar" id="barPro"></div>
    <div class="blab" id="labRev">Revenue<small>RECORD HIGH</small></div>
    <div class="blab" id="labPro">Profit<small>STANDS STILL</small></div>
    <div id="recTag">setting records</div>
    <div id="stillTag">flat</div>
  </div>

  <script>
    (function(){
      const SLOT = 5.48, S = '[data-composition-id="k-bars"] ';
      const tl = gsap.timeline({ paused: true });
      tl.fromTo(S+'.title', { opacity:0, y:16 }, { opacity:1, y:0, duration:.5, ease:'power3.out' }, 0.1);
      gsap.set([S+'#barRev', S+'#barPro'], { scaleY: 0 });
      tl.fromTo(S+'.chart', { opacity:0 }, { opacity:1, duration:.4, ease:'sine.out' }, 0.2);
      tl.to(S+'#barRev', { scaleY: 1, duration:1.1, ease:'power3.out' }, 0.5);
      tl.to(S+'#barPro', { scaleY: 1, duration:1.1, ease:'power3.out' }, 0.7);
      tl.fromTo([S+'#labRev', S+'#labPro'], { opacity:0, y:14 }, { opacity:1, y:0, duration:.5, stagger:.12, ease:'power2.out' }, 1.1);
      tl.fromTo(S+'#recTag', { opacity:0, y:10 }, { opacity:1, y:0, duration:.5, ease:'back.out(1.6)' }, 1.5);
      tl.fromTo(S+'#stillTag', { opacity:0, scale:.8 }, { opacity:1, scale:1, duration:.5, ease:'back.out(1.6)' }, 1.9);
      tl.to(S+'#barRev', { scaleY: 1.06, duration:1.4, ease:'sine.inOut', yoyo:true, repeat:1 }, 2.4);
      tl.to({}, { duration: SLOT }, 0);
      window.__timelines = window.__timelines || {};
      window.__timelines['k-bars'] = tl;
    })();
  </script>
  </div>
</template>
