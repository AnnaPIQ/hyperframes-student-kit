<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1350" />
    <title>my-meta-ad</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;500;600&display=block"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/brand-tokens.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        background: var(--brand-bg);
        font-family: var(--font-display);
        color: var(--brand-text);
      }
      /* Subtle radial vignette so the title pops off the canvas. */
      #bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(120% 80% at 50% 35%, var(--brand-surface) 0%, var(--brand-bg) 60%);
      }
      /* Meta-ad safe area: keep hero content inside ~10% margins so nothing
         important sits under the platform UI chrome. */
      #stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 135px 108px; /* ~10% of 1350 / 1080 */
        text-align: center;
      }
      #eyebrow {
        font-family: var(--font-mono);
        font-size: 28px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--brand-accent);
      }
      #headline {
        font-size: 104px;
        font-weight: 800;
        line-height: 1.02;
        letter-spacing: -0.02em;
        max-width: 880px;
      }
      #headline .hot { color: var(--brand-warn); }
      #subhead {
        font-size: 38px;
        font-weight: 500;
        line-height: 1.3;
        color: var(--brand-text-dim);
        max-width: 760px;
      }
      #cta {
        margin-top: 16px;
        font-size: 34px;
        font-weight: 700;
        color: var(--brand-bg);
        background: var(--brand-accent);
        padding: 24px 52px;
        border-radius: 999px;
        box-shadow: 0 18px 60px -12px var(--brand-accent-glow);
      }
    </style>
  </head>
  <body>
    <!-- Render Contract: root needs id, data-composition-id, data-start=0,
         data-width, data-height. Timed visible children need class="clip" plus
         data-start / data-duration / data-track-index. -->
    <div
      id="root"
      data-composition-id="my-meta-ad"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1350"
    >
      <div id="bg" class="clip" data-start="0" data-duration="6" data-track-index="0"></div>

      <div id="stage" class="clip" data-start="0" data-duration="6" data-track-index="1">
        <div id="eyebrow">YOUR BRAND</div>
        <div id="headline">Say it in <span class="hot">one line</span>.</div>
        <div id="subhead">Swap this copy, drop in your logo, and ship your first Meta ad.</div>
        <div id="cta">Learn more</div>
      </div>
    </div>

    <script>
      // Render Contract: exactly one paused GSAP timeline, keyed to the
      // data-composition-id, registered on window.__timelines.
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#eyebrow", { opacity: 0, y: 20, duration: 0.5, ease: "power2.out" }, 0.2)
        .from("#headline", { opacity: 0, y: 40, duration: 0.7, ease: "power3.out" }, 0.45)
        .from("#subhead", { opacity: 0, y: 24, duration: 0.6, ease: "power2.out" }, 0.95)
        .from("#cta", { opacity: 0, scale: 0.85, duration: 0.5, ease: "back.out(1.7)" }, 1.35)
        // Gentle CTA pulse to draw the eye while the outro holds.
        .to("#cta", { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 2 }, 2.2);

      // Pad the timeline so its duration matches the root data-duration (Law #7/#11).
      tl.to({}, { duration: 6 }, 0);
      window.__timelines["my-meta-ad"] = tl;
    </script>
  </body>
</html>
