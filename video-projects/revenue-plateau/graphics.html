<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1350" />
    <title>revenue-plateau — EcomIQ Meta ad</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/brand-tokens.css" />
    <style>
      /* LOCAL fonts — no network dependency at render time (latin subset) */
      @font-face { font-family: 'Rethink Sans'; font-style: normal; font-weight: 400 800;
        font-display: block; src: url(assets/fonts/RethinkSans.woff2) format('woff2'); }
      @font-face { font-family: 'Hedvig Letters Serif'; font-style: normal; font-weight: 400;
        font-display: block; src: url(assets/fonts/HedvigLettersSerif.woff2) format('woff2'); }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* Chroma-key canvas — the screenshot renderer ignores body bg and bakes
         black, so the see-through regions are a real green ELEMENT (#keybg)
         that ffmpeg colorkeys out, dropping the founder/desk footage behind. */
      html, body { width: 1080px; height: 1350px; overflow: hidden;
        background: #00ff00; font-family: 'Rethink Sans', system-ui, sans-serif;
        color: var(--brand-white); }
      #keybg { position: absolute; inset: 0; background: #00ff00; }

      /* Founder talking-head — full-bleed base layer. Non-timed wrapper so the
         end-card crossfade animates the wrapper, never the <video>. */
      #founderWrap { position: absolute; inset: 0; }
      #founderWrap video { width: 1080px; height: 1350px; object-fit: cover; display: block; }

      /* Dryft b-roll overlay (proof beat) — same non-timed-wrapper pattern. */
      #dryftWrap { position: absolute; inset: 0; }
      #dryftWrap video { width: 1080px; height: 1350px; object-fit: cover; display: block; }

      /* Persistent brand mark, top-left, inside the safe area. */
      #logoBar { position: absolute; top: 54px; left: 64px; width: 230px; }
      #logoBar img { width: 100%; height: auto; display: block;
        filter: drop-shadow(0 4px 14px rgba(6, 40, 76, 0.55)); }

      /* ---- Motion-graphics cutaway scenes (sub-compositions) ---- */
      .scmount { position: absolute; inset: 0; }

      /* ---- Proof stat (61.5–65.5s), rides on top of the Dryft b-roll.
             Opaque so chroma-key edges stay clean. ---- */
      #stat { position: absolute; top: 96px; left: 64px; right: 64px;
        text-align: center; padding: 36px 30px 40px;
        background: #06284C; border-radius: 28px;
        border: 1px solid rgba(156, 212, 255, .4); }
      #stat .big { font-size: 150px; font-weight: 800; line-height: 1;
        letter-spacing: -.03em; color: var(--brand-flame); }
      #stat .label { margin-top: 8px; font-size: 44px; font-weight: 700; color: var(--brand-white); }
      #stat .sub { margin-top: 10px; font-size: 30px; font-weight: 500; color: var(--brand-blue-tint); }

      /* ---- Captions: bottom-center pills, brand type ---- */
      .cap { position: absolute; left: 64px; right: 64px; bottom: 96px;
        display: flex; justify-content: center; }
      .cap span { display: inline-block; max-width: 880px; text-align: center;
        font-size: 41px; font-weight: 600; line-height: 1.3; color: var(--brand-white);
        background: #06284C; padding: 20px 34px; border-radius: 20px;
        border: 1px solid rgba(156, 212, 255, .22); }
      .cap b { font-weight: 800; color: var(--brand-flame); }
      .cap i { font-style: normal; font-weight: 700; color: var(--brand-blue-tint); }

      /* ---- End card (86.5–93s): FULL-SCREEN navy card (opaque — covers the key). ---- */
      #endcard { position: absolute; inset: 0;
        background:
          radial-gradient(90% 55% at 50% 24%, rgba(156,212,255,.12) 0%, rgba(6,40,76,0) 58%),
          #06284C; }
      #endcard .bloom { position: absolute; left: -10%; bottom: -22%; width: 120%; height: 55%;
        background: var(--brand-gradient-2); filter: blur(90px); opacity: .34; }
      #endcard .inner { position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 30px; padding: 0 90px; text-align: center; }
      #endcard .logo { width: 430px; height: auto; margin-bottom: 16px; }
      #endcard .headline { font-size: 96px; font-weight: 800; line-height: 1.02;
        letter-spacing: -.02em; color: var(--brand-white); }
      #endcard .headline .em { font-family: 'Hedvig Letters Serif', serif; font-style: italic;
        font-weight: 400; letter-spacing: -.01em; color: var(--brand-blue-tint); }
      #endcard .sub { font-size: 36px; font-weight: 500; line-height: 1.35;
        color: var(--brand-sky); max-width: 760px; }
      #endcard .cta { margin-top: 18px; display: inline-flex; align-items: center; gap: 16px;
        font-size: 40px; font-weight: 700; color: var(--brand-white);
        background: var(--brand-flame); padding: 28px 60px; border-radius: 999px;
        box-shadow: 0 22px 70px -16px rgba(255, 76, 50, .65); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="revenue-graphics" data-start="0" data-duration="93"
         data-width="1080" data-height="1350">

      <!-- GRAPHICS-ONLY LAYER — no <video>/<audio>. Green key fills every
           see-through region; ffmpeg colorkeys it and drops the footage behind. -->
      <div id="keybg" class="clip" data-start="0" data-duration="93" data-track-index="0"></div>

      <!-- Motion-graphics cutaways, synced to the VO -->
      <div id="sc-flatline" class="scmount" data-composition-id="flatline-open"
           data-composition-src="compositions/flatline-open.html"
           data-start="0" data-duration="5.5" data-track-index="4" data-width="1080" data-height="1350"></div>
      <div id="sc-montage" class="scmount" data-composition-id="more-montage"
           data-composition-src="compositions/more-montage.html"
           data-start="8.5" data-duration="4.9" data-track-index="4" data-width="1080" data-height="1350"></div>
      <div id="sc-system" class="scmount" data-composition-id="system-friction"
           data-composition-src="compositions/system-friction.html"
           data-start="18.5" data-duration="8" data-track-index="4" data-width="1080" data-height="1350"></div>
      <div id="sc-tiles" class="scmount" data-composition-id="metric-tiles"
           data-composition-src="compositions/metric-tiles.html"
           data-start="26.5" data-duration="10.5" data-track-index="5" data-width="1080" data-height="1350"></div>
      <div id="sc-bottleneck" class="scmount" data-composition-id="bottleneck"
           data-composition-src="compositions/bottleneck.html"
           data-start="77" data-duration="6.5" data-track-index="4" data-width="1080" data-height="1350"></div>

      <!-- Brand mark -->
      <div id="logoBar" class="clip" data-start="0" data-duration="86.5" data-track-index="3">
        <img src="assets/ecomiq-logo-white.svg" alt="EcomIQ" />
      </div>

      <!-- Proof stat over the b-roll -->
      <div id="stat" class="clip" data-start="61.5" data-duration="4" data-track-index="5">
        <div class="big">+59%</div>
        <div class="label">returning customers</div>
        <div class="sub">without another dollar on ads</div>
      </div>


      <!-- End card: navy scrim is semi-transparent so the desk footage
           composited underneath shows through. -->
      <div id="endcard" class="clip" data-start="86.5" data-duration="6.5" data-track-index="8">
        <div class="bloom"></div>
        <div class="inner">
          <img class="logo" src="assets/ecomiq-logo-white.png" alt="EcomIQ" />
          <div class="headline">Fix what&rsquo;s <span class="em">already</span> there.</div>
          <div class="sub">We find the bottleneck. You get the breakthrough.</div>
          <div class="cta">Learn how &rarr;</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // NOTE: elements sitting over the green key (logoBar, caption pills, stat)
      // must NOT fade opacity — a partial-opacity frame blends with green and
      // won't chroma-key cleanly. They enter with transform only. Scene mounts
      // hard-cut (their own opaque navy bg covers the key instantly); elements
      // INSIDE a scene or the endcard panel fade freely (over opaque navy).

      // ---- Brand mark (transform-only entrance over the key) ----
      tl.from("#logoBar", { y: -16, duration: 0.5, ease: "power2.out" }, 0.2);

      // ---- Captions removed (to be added back later) ----

      // ---- Proof stat: scale/slide only, no opacity fade ----
      tl.from("#stat", { scale: 0.85, y: 24, duration: 0.5, ease: "back.out(1.7)" }, 61.55);

      // ---- End card: content fades over the opaque navy panel (safe) ----
      tl.from("#endcard .logo", { opacity: 0, y: -22, duration: 0.6, ease: "power3.out" }, 86.6)
        .from("#endcard .headline", { opacity: 0, y: 30, duration: 0.65, ease: "power3.out" }, 86.85)
        .from("#endcard .sub", { opacity: 0, y: 22, duration: 0.55, ease: "power2.out" }, 87.15)
        .from("#endcard .cta", { opacity: 0, scale: 0.85, duration: 0.55, ease: "back.out(1.7)" }, 87.5)
        .from("#endcard .bloom", { opacity: 0, duration: 1.1, ease: "sine.out" }, 86.5)
        // CTA breathes to hold attention through the outro (finite repeats).
        .to("#endcard .cta", { scale: 1.04, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 6 }, 88.1);

      // Duration anchor — timeline must fill the 93s slot.
      tl.to({}, { duration: 93 }, 0);
      window.__timelines["revenue-graphics"] = tl;
    </script>
  </body>
</html>
