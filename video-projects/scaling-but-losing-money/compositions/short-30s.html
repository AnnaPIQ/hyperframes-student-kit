<!doctype html>

    <link rel="stylesheet" href="../assets/brand-tokens.css" />
    <style>
      @font-face { font-family: 'Rethink Sans'; font-style: normal; font-weight: 400 800;

      @font-face { font-family: 'Hedvig Letters Serif'; font-style: italic; font-weight: 400;
        font-display: block; src: url(../assets/fonts/HedvigLettersSerif.woff2) format('woff2'); }
      * { margin: 0; padding: 0; box-sizing: border-box; }

        filter: drop-shadow(0 4px 14px rgba(0,0,0,.45)); }

      #g0 .eyebrow { font-weight: 700; font-size: 30px; letter-spacing: .30em;
        text-transform: uppercase; color: var(--brand-blue-tint); margin-bottom: 30px; }
      #g0 .head { font-weight: 800; font-size: 110px; letter-spacing: -.03em; line-height: 1.0; }

      /* Gp — problem */
      #gp .huge { font-weight: 800; font-size: 124px; letter-spacing: -.03em; line-height: .98; }

      /* Gs — split */
      #gs .cols { display: flex; gap: 34px; width: 100%; }
      #gs .col { flex: 1; border: 1px solid var(--brand-border); border-radius: 26px;

      #gs .col .k { font-weight: 800; font-size: 76px; letter-spacing: -.02em; }
      #gs .col .v { font-weight: 500; font-size: 36px; color: var(--brand-text-dim); margin-top: 14px; }

  <body>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo('#logobar', { opacity: 0, y: -14 }, { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }, 0.2);

      // G0 hook → blur-dissolve into speaker

      tl.to('#g0', { opacity: 0, filter: 'blur(18px)', duration: 0.55, ease: 'power2.inOut' }, 2.55);

      // Gp — problem punch (hard cut in at 7.0)
      tl.fromTo('#gp .huge', { opacity: 0, scale: 0.9, y: 20 }, { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 7.05);

      // Gs — split + recolor punch
      tl.fromTo('#colrev', { opacity: 0, y: 34 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 9.85);
      tl.fromTo('#colprof', { opacity: 0, y: 34 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 10.15);
      tl.to('#colprof', { borderColor: 'var(--brand-flame)', backgroundColor: '#241016',
