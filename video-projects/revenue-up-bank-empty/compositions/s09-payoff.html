      box-shadow: 0 0 18px rgba(255,76,50,.6); }
    [data-composition-id="s09-payoff"] #lineKeep { top: 520px; }
    [data-composition-id="s09-payoff"] #lineKeep em { font-family: 'Hedvig Letters Serif', serif; font-style: italic; font-weight: 400; color: #FF4C32; }

    [data-composition-id="s09-payoff"] .bank { position: absolute; left: 240px; top: 712px; width: 600px; height: 320px;
      background: linear-gradient(150deg, #0d3768, #0a325f); border: 1px solid #1d4a7a; border-radius: 30px;

    [data-composition-id="s09-payoff"] .coin { position: absolute; left: 506px; top: 660px; width: 78px; height: 78px; border-radius: 50%;

      display: grid; place-items: center; font-weight: 800; font-size: 38px; color: #5a2410; }
    [data-composition-id="s09-payoff"] .cap { position: absolute; top: 1086px; left: 0; right: 0; text-align: center;

  <div class="line clip" id="lineSold" data-start="0.1" data-duration="3.9" data-track-index="1">Revenue is what you <span class="strike">sold<i class="strk"></i></span>.</div>
  <div class="line clip" id="lineKeep" data-start="1.4" data-duration="6.0" data-track-index="2">Profit is what you <em>keep</em>.</div>

  <div class="bank clip" data-start="3.9" data-duration="3.52" data-track-index="3">

  </div>
  <div class="coin clip" data-start="4.0" data-duration="1.6" data-track-index="4">$</div>
  <div class="cap clip" data-start="5.2" data-duration="2.2" data-track-index="5">Only one ends up in your account.</div>

  <script>
    (function(){
      const SLOT = 7.42, S = '[data-composition-id="s09-payoff"] ';
      const tl = gsap.timeline({ paused: true });

      tl.fromTo(S+'#lineSold', { opacity:0, y:20 }, { opacity:1, y:0, duration:.55, ease:'power3.out' }, 0.1);
      tl.fromTo(S+'#lineKeep', { opacity:0, y:24 }, { opacity:1, y:0, duration:.6, ease:'power3.out' }, 1.4);

      // strike the word "sold"
      tl.to(S+'#lineSold .strk', { scaleX:1, duration:.5, ease:'power2.inOut' }, 1.9);

      // lines lift up to make room for the bank card
      tl.to([S+'#lineSold', S+'#lineKeep'], { y:'-=120', duration:.6, ease:'power2.inOut' }, 3.6);

      // bank card in
      tl.fromTo(S+'.bank', { opacity:0, y:40, scale:.95 }, { opacity:1, y:0, scale:1, duration:.55, ease:'back.out(1.4)' }, 3.9);

      // coin drops into the card
      tl.fromTo(S+'.coin', { opacity:0, y:-40, scale:.6 }, { opacity:1, y:0, scale:1, duration:.4, ease:'power2.in' }, 4.0);
      tl.to(S+'.coin', { y:170, duration:.5, ease:'power2.in' }, 4.4);
      tl.to(S+'.coin', { opacity:0, scale:.4, duration:.25, ease:'power1.out' }, 4.85);

      // balance ticks up as the coin lands
      const o = { v: 0 }, bal = document.querySelector(S+'#bal');
      tl.to(o, { v: 86, duration:1.2, ease:'power2.out', onUpdate(){ bal.textContent = '$'+Math.round(o.v)+'K'; } }, 4.9);

      tl.fromTo(S+'.cap', { opacity:0, y:14 }, { opacity:1, y:0, duration:.5, ease:'power2.out' }, 5.2);

      tl.to({}, { duration: SLOT }, 0);
      window.__timelines = window.__timelines || {};
      window.__timelines['s09-payoff'] = tl;
    })();
  </script>
