  <script>
    (function(){
      const SLOT = 10.10, S = '[data-composition-id="s02-looks-good"] ';
      const tl = gsap.timeline({ paused: true });
      tl.fromTo(S+'.kicker', { opacity:0, y:18 }, { opacity:1, y:0, duration:.6, ease:'power3.out' }, 0.1);

      const tiles = ['.t1','.t2','.t3'];
      tiles.forEach((t,i)=> tl.fromTo(S+t, { opacity:0, y:46, scale:.96 },
        { opacity:1, y:0, scale:1, duration:.6, ease:'back.out(1.5)' }, 0.5 + i*0.18));

      const count = (sel, to, fmt, at) => {
        const o = { v: 0 }, el = document.querySelector(S+sel);
        tl.to(o, { v: to, duration: 1.5, ease: 'power2.out',
          onUpdate(){ el.textContent = fmt(o.v); } }, at);
      };
      count('#lg-rev', 248, v => '$'+Math.round(v)+'K', 0.7);
      count('#lg-ord', 5120, v => Math.round(v).toLocaleString('en-US'), 1.0);
      count('#lg-grw', 41, v => '+'+Math.round(v)+'%', 1.35);

      tl.to({}, { duration: SLOT }, 0);
      window.__timelines = window.__timelines || {};
      window.__timelines['s02-looks-good'] = tl;
    })();
