    <style>
      [data-composition-id="playbook"] { position: absolute; inset: 0; }
      [data-composition-id="playbook"] .pb-root {
        position: absolute; inset: 0; background: var(--brand-navy);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; padding: 90px 60px 200px; font-family: "Rethink Sans", sans-serif;
      }
      [data-composition-id="playbook"] .pb-eyebrow { font-weight: 800; font-size: 40px; letter-spacing: .28em; color: var(--brand-blue-tint); opacity: 0; }
      [data-composition-id="playbook"] .pb-sub { font-weight: 600; font-size: 38px; color: var(--brand-text-dim); opacity: 0; }
      [data-composition-id="playbook"] .pb-chart { width: 760px; height: 380px; margin-top: 6px; }
      [data-composition-id="playbook"] .pb-base { stroke: rgba(159,182,212,.18); stroke-width: 2; }

      [data-composition-id="playbook"] .pb-down { fill: none; stroke: var(--brand-flame); stroke-width: 9; stroke-linecap: round;

        border: 2px solid rgba(156,212,255,.5); border-radius: 999px; padding: 10px 26px; opacity: 0;
      }

        position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%) scale(.8);
        text-align: center; font-weight: 800; font-size: 112px; letter-spacing: -.02em; color: var(--brand-flame);

    <link rel="stylesheet" href="../assets/fonts.css" />
    <link rel="stylesheet" href="../assets/brand-tokens.css" />
    <script src="../assets/gsap.min.js"></script>
    <script>
      (function () {
        const s = '[data-composition-id="playbook"] ';
        const tl = gsap.timeline({ paused: true });
        tl.from(s + ".pb-root", { opacity: 0, duration: 0.3, ease: "power2.out" }, 0);
        tl.to(s + ".pb-eyebrow", { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.15);
        tl.to(s + ".pb-sub", { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.35);
        // The line that WORKED — rises up-and-to-the-right (legit, per VO).
        tl.to(s + ".pb-up", { strokeDashoffset: 0, duration: 2.2, ease: "power1.inOut" }, 0.4);
        tl.to(s + ".pb-knee", { opacity: 1, duration: 0.2 }, 2.5);
        tl.to(s + ".pb-tag", { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.6)" }, 2.7);
        // ~master 13s ("completely changed"): glitch, then it BREAKS down.
        tl.to(s + ".pb-chart", { x: -16, duration: 0.04, ease: "power1.in", yoyo: true, repeat: 5 }, 4.7);
        tl.to(s + ".pb-tag", { opacity: 0, duration: 0.15 }, 4.7);
        tl.to(s + ".pb-sub", { opacity: 0, duration: 0.15 }, 4.7);
        tl.to(s + ".pb-down", { strokeDashoffset: 0, duration: 0.6, ease: "power2.in" }, 4.9);
        tl.to(s + ".pb-stab", { opacity: 1, scale: 1, duration: 0.3, ease: "back.out(1.8)" }, 5.0);
        tl.to(s + ".pb-root", { opacity: 0, duration: 0.3, ease: "power2.in" }, 6.7);
        tl.set({}, {}, 7.0);
        window.__timelines = window.__timelines || {};
        window.__timelines["playbook"] = tl;
      })();
    </script>
  </div>
</template>
