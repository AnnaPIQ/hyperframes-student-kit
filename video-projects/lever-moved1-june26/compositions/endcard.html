<template id="endcard-template">
  <div data-composition-id="endcard" data-start="0" data-width="1080" data-height="1350" data-duration="5.0">
    <div class="ec-root">
      <img class="ec-logo" id="ec-logo" src="../assets/ecomiq-logo-white.svg" alt="EcomIQ" />
      <div class="ec-line1" id="ec-line1">Coaching, mentorship &amp; strategy for Shopify brands.</div>
      <div class="ec-line2" id="ec-line2">Find what's actually holding your brand back.</div>
      <div class="ec-btn" id="ec-btn">

        <span class="ec-underline" id="ec-underline"></span>
      </div>
    </div>
    <style>
      [data-composition-id="endcard"] { position: absolute; inset: 0; }
      [data-composition-id="endcard"] .ec-root { position: absolute; inset: 0;
        background: radial-gradient(110% 75% at 50% 30%, rgba(13,58,104,.86) 0%, rgba(6,40,76,.93) 60%, rgba(6,40,76,.97) 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 30px; padding: 0 90px; font-family: "Rethink Sans", sans-serif; text-align: center; }
      [data-composition-id="endcard"] .ec-logo { width: 360px; height: auto; opacity: 0;
        filter: drop-shadow(0 4px 18px rgba(0,0,0,.5)); }
      [data-composition-id="endcard"] .ec-line1 { font-weight: 600; font-size: 40px; line-height: 1.3; color: var(--brand-blue-tint);
        max-width: 820px; opacity: 0; }
      [data-composition-id="endcard"] .ec-line2 { font-family: "Hedvig Letters Serif", Georgia, serif; font-style: italic; font-weight: 400;
        font-size: 76px; line-height: 1.08; color: #fff; max-width: 880px; opacity: 0; text-shadow: 0 4px 22px rgba(0,0,0,.4); }
      [data-composition-id="endcard"] .ec-btn { position: relative; display: inline-flex; align-items: center; gap: 18px;
        margin-top: 14px; padding: 28px 56px; border-radius: 999px; background: var(--brand-flame);
        font-weight: 800; font-size: 42px; color: #fff; box-shadow: 0 22px 60px -16px rgba(255,76,50,.65); opacity: 0; }
      [data-composition-id="endcard"] .ec-arrow { font-size: 42px; }

    </style>
    <link rel="stylesheet" href="../assets/fonts.css" />
    <link rel="stylesheet" href="../assets/brand-tokens.css" />
    <script src="../assets/gsap.min.js"></script>
    <script>
      (function () {
        const s = '[data-composition-id="endcard"] ';
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(s + ".ec-root", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
        tl.fromTo(s + "#ec-logo", { opacity: 0, y: -18, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "power3.out" }, 0.2);
        tl.fromTo(s + "#ec-line1", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 0.55);
        tl.fromTo(s + "#ec-line2", { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.85);
        tl.fromTo(s + "#ec-btn", { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.6)" }, 1.25);
        tl.to(s + "#ec-underline", { scaleX: 1, duration: 0.4, ease: "power3.out" }, 1.7);
        // Arrow nudge — finite repeat across the hold.
        tl.to(s + "#ec-arrow", { x: 12, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 4 }, 2.0);
        tl.set({}, {}, 5.0);
        window.__timelines = window.__timelines || {};
        window.__timelines["endcard"] = tl;
      })();
    </script>
  </div>
</template>
