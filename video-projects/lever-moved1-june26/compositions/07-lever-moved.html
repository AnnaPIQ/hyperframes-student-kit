<template id="levermoved-template">
  <div data-composition-id="levermoved" data-start="0" data-width="1080" data-height="1350" data-duration="2.5">
    <div class="lm-root">
      <div class="lm-scrim"></div>
      <div class="lm-burst"></div>
      <svg class="lm-lever" id="lm-lever" viewBox="0 0 560 320">
        <line x1="120" y1="300" x2="440" y2="300" stroke="rgba(255,255,255,.3)" stroke-width="4" />
        <polygon points="280,250 240,300 320,300" fill="var(--brand-blue-tint)" />
        <g><rect x="120" y="238" width="320" height="24" rx="12" fill="#fff" /><circle cx="440" cy="250" r="28" fill="var(--brand-flame)" /></g>
      </svg>
      <div class="lm-stab" id="lm-stab">The lever moved.</div>
    </div>
    <style>
      [data-composition-id="levermoved"] { position: absolute; inset: 0; }
      [data-composition-id="levermoved"] .lm-root { position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 30px; font-family: "Rethink Sans", sans-serif; }
      [data-composition-id="levermoved"] .lm-scrim { position: absolute; inset: 0;
        background: radial-gradient(60% 45% at 50% 52%, rgba(6,16,30,.72) 0%, rgba(6,16,30,0) 70%); }
      [data-composition-id="levermoved"] .lm-burst { position: absolute; top: 40%; left: 50%; width: 520px; height: 520px;
        margin: -260px 0 0 -260px; border-radius: 50%; opacity: 0;
        background: radial-gradient(circle, rgba(255,76,50,.55) 0%, rgba(255,76,50,0) 62%); }
      [data-composition-id="levermoved"] .lm-lever { position: relative; width: 360px; height: 206px; }
      [data-composition-id="levermoved"] .lm-stab { position: relative; font-family: "Hedvig Letters Serif", Georgia, serif;
        font-style: italic; font-weight: 400; font-size: 124px; line-height: 1; color: var(--brand-flame);
        text-shadow: 0 0 50px rgba(255,76,50,.5), 0 4px 18px rgba(0,0,0,.5); }
    </style>
    <link rel="stylesheet" href="../assets/fonts.css" />
    <link rel="stylesheet" href="../assets/brand-tokens.css" />
    <script src="../assets/gsap.min.js"></script>
    <script>
      (function () {
        const s = '[data-composition-id="levermoved"] ';
        const tl = gsap.timeline({ paused: true });
        tl.to(s + ".lm-scrim", { opacity: 1, duration: 0.3, ease: "power2.out" }, 0);
        // Lever appears in the old position, then physically MOVES to a new one.
        tl.fromTo(s + "#lm-lever", { opacity: 0, x: -150 }, { opacity: 1, x: -150, duration: 0.25, ease: "power2.out" }, 0.05);
        tl.to(s + "#lm-lever", { x: 150, scaleX: 1.06, duration: 0.45, ease: "back.out(1.5)" }, 0.4);
        tl.to(s + "#lm-lever", { scaleX: 1.0, duration: 0.2, ease: "power2.out" }, 0.85);
        tl.fromTo(s + ".lm-burst", { opacity: 0, scale: 0.3 }, { opacity: 0.95, scale: 1.35, duration: 0.3, ease: "power2.out" }, 0.5);
        tl.to(s + ".lm-burst", { opacity: 0, duration: 0.5, ease: "power2.in" }, 0.8);
        tl.fromTo(s + "#lm-stab", { opacity: 0, scale: 0.72, y: 22 }, { opacity: 1, scale: 1, y: 0, duration: 0.42, ease: "back.out(1.7)" }, 0.6);
        tl.to(s + ".lm-root", { opacity: 0, duration: 0.3, ease: "power2.in" }, 2.2);
        tl.set({}, {}, 2.5);
        window.__timelines = window.__timelines || {};
        window.__timelines["levermoved"] = tl;
      })();
    </script>
  </div>
</template>
